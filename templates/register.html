{% extends "base.html" %}
{% block title %}· Student Register{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4">
        <h4 class="fw-bold mb-1" style="color:#1d3557;"><i class="bi bi-person-plus me-2" style="color:var(--tq);"></i>Student Registration</h4>
        <p class="text-muted small mb-4">Your information stays confidential</p>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label small fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-4">
            <label class="form-label small fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" required minlength="6">
          </div>
          <button type="submit" class="btn btn-teal w-100 py-2">Create Account</button>
        </form>
        <p class="text-center text-muted small mt-3 mb-0">Already have an account? <a href="/login" style="color:var(--tq);">Login</a></p>
        <p class="text-center text-muted small mt-1 mb-0">Are you a counsellor? <a href="/counsellor/register" style="color:var(--tq);">Register here</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
