{% extends "base.html" %}
{% block title %}· New Post{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:650px;">
  <h4 class="fw-bold mb-1" style="color:#1d3557;"><i class="bi bi-pencil me-2" style="color:var(--tq);"></i>Share with the Community</h4>
  <p class="text-muted small mb-4">Your story might help someone else.</p>
  <div class="card p-4">
    <form method="POST">
      <div class="mb-3"><label class="form-label small fw-semibold">Title</label>
        <input type="text" name="title" class="form-control" required maxlength="100"></div>
      <div class="mb-3"><label class="form-label small fw-semibold">Category</label>
        <select name="category" class="form-select" required>
          <option value="">Select topic</option>
          {% for c in ['Anxiety','Depression','Stress','Sleep','Relationships','Academic Pressure','Loneliness','Self-Care','General'] %}
          <option>{{ c }}</option>{% endfor %}
        </select></div>
      <div class="mb-3"><label class="form-label small fw-semibold">Your Message</label>
        <textarea name="content" class="form-control" rows="6" required></textarea></div>
      <div class="form-check mb-4">
        <input type="checkbox" class="form-check-input" name="anonymous" id="anon">
        <label class="form-check-label small" for="anon"><i class="bi bi-incognito me-1"></i>Post anonymously</label>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-teal px-4">Share Post</button>
        <a href="/forum" class="btn btn-outline-secondary px-4">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
